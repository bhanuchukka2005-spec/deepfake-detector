name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check api/ model/ --select E,F,W --ignore E501 --exit-zero

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: pip install bandit safety

      - name: SAST — Bandit
        run: bandit -r api/ model/ -ll --exit-zero

      - name: Dependency audit — Safety
        run: safety check -r requirements.txt --exit-code 0

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU-only torch for CI speed)
        run: |
          pip install fastapi uvicorn pytest pytest-asyncio httpx python-multipart pydantic aiofiles
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers opencv-python-headless Pillow numpy

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deepfake-detector .

      - name: Smoke test — health check
        run: |
          docker run -d -p 8000:8000 --name smoke deepfake-detector
          sleep 8
          curl --fail http://localhost:8000/health || exit 1
          docker stop smoke